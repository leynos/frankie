name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@8c8e8a38f1f9a783ba7e25ba2c0f9bfda5bf2cb3
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Spelling
        run: make spelling
      - name: Lint
        run: make lint
      - name: Install VidaiMock
        shell: bash
        env:
          VIDAIMOCK_SHA256: ${{ vars.VIDAIMOCK_SHA256 }}
        run: |
          set -euo pipefail
          VIDAIMOCK_VERSION="v0.1.2"
          VIDAIMOCK_TARBALL="vidaimock-linux-x64.tar.gz"
          VIDAIMOCK_URL="https://github.com/vidaiUK/VidaiMock/releases/download/${VIDAIMOCK_VERSION}/${VIDAIMOCK_TARBALL}"
          VIDAIMOCK_SHA256_DEFAULT="0efd1dd07f745465e6af9b122a04e6663ad475dd255e34851ef7e1b751acf8d5"

          mkdir -p "${HOME}/.local/bin"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          mkdir -p "${HOME}/git"
          pushd "${HOME}/git"
          curl -fsSLO "${VIDAIMOCK_URL}"
          if [[ -z "${VIDAIMOCK_SHA256:-}" ]]; then
            echo "VIDAIMOCK_SHA256 is not set; using pinned fallback checksum for v0.1.2." >&2
            VIDAIMOCK_SHA256="${VIDAIMOCK_SHA256_DEFAULT}"
          fi
          echo "${VIDAIMOCK_SHA256}  ${VIDAIMOCK_TARBALL}" | sha256sum --check
          tar -xzf "${VIDAIMOCK_TARBALL}"
          cp vidaimock/vidaimock "${HOME}/.local/bin"
          popd
          chmod +x "${HOME}/.local/bin/vidaimock"
          if ! "${HOME}/.local/bin/vidaimock" --version >/dev/null; then
            echo "VidaiMock sanity check failed: --version returned non-zero." >&2
            exit 1
          fi
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@8c8e8a38f1f9a783ba7e25ba2c0f9bfda5bf2cb3
        with:
          output-path: lcov.info
          format: lcov
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/74666
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
