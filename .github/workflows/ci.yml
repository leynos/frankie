name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.6'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@18bed1ca49a6de3d8882bd72635a32ae3f023d57
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Spelling
        run: make spelling
      - name: Cache Whitaker installer
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker Dylint suite
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Install VidaiMock
        shell: bash
        env:
          VIDAIMOCK_SHA256: ${{ vars.VIDAIMOCK_SHA256 }}
        run: |
          set -euo pipefail
          VIDAIMOCK_VERSION="v0.1.2"
          VIDAIMOCK_TARBALL="vidaimock-linux-x64.tar.gz"
          VIDAIMOCK_URL="https://github.com/vidaiUK/VidaiMock/releases/download/${VIDAIMOCK_VERSION}/${VIDAIMOCK_TARBALL}"
          VIDAIMOCK_SHA256_DEFAULT="0efd1dd07f745465e6af9b122a04e6663ad475dd255e34851ef7e1b751acf8d5"

          mkdir -p "${HOME}/.local/bin"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          mkdir -p "${HOME}/git"
          pushd "${HOME}/git"
          curl -fsSLO "${VIDAIMOCK_URL}"
          if [[ -z "${VIDAIMOCK_SHA256:-}" ]]; then
            echo "VIDAIMOCK_SHA256 is not set; using pinned fallback checksum for v0.1.2." >&2
            VIDAIMOCK_SHA256="${VIDAIMOCK_SHA256_DEFAULT}"
          fi
          echo "${VIDAIMOCK_SHA256}  ${VIDAIMOCK_TARBALL}" | sha256sum --check
          tar -xzf "${VIDAIMOCK_TARBALL}"
          cp vidaimock/vidaimock "${HOME}/.local/bin"
          popd
          chmod +x "${HOME}/.local/bin/vidaimock"
          if ! "${HOME}/.local/bin/vidaimock" --version >/dev/null; then
            echo "VidaiMock sanity check failed: --version returned non-zero." >&2
            exit 1
          fi
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@18bed1ca49a6de3d8882bd72635a32ae3f023d57
        with:
          output-path: lcov.info
          format: lcov
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@9f788dad94c848e3bbddfb90f9e80b6742b7390c
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/74666
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
